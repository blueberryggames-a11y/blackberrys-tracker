<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status | Blackberry Games</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #announcement-banner {
            display: none;
            width: 100%;
            background-color: var(--danger);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            position: fixed;
            top: 0;
            left: 0;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .status-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 50px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .online .dot {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-green 2s infinite;
        }

        .offline .dot {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn.disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
            pointer-events: none;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div id="announcement-banner">⚠️ Awaiting new website link...</div>

    <div class="status-card">
        <h1>Blackberry Games</h1>
        <p>System Status Tracker</p>

        <div id="status-container" class="status-indicator">
            <div class="dot"></div>
            <span id="status-text">Checking status...</span>
        </div>

        <a href="#" id="site-link" class="btn disabled">Loading...</a>
    </div>

    <script>
        // Fetch the config file hosted in your GitHub repo
        fetch('config.json')
            .then(response => {
                if (!response.ok) throw new Error("Config not found");
                return response.json();
            })
            .then(data => {
                const banner = document.getElementById('announcement-banner');
                const statusContainer = document.getElementById('status-container');
                const statusText = document.getElementById('status-text');
                const siteLink = document.getElementById('site-link');

                if (data.isDown) {
                    // Site is marked as DOWN
                    banner.style.display = 'block';
                    statusContainer.className = 'status-indicator offline';
                    statusText.innerText = 'Systems Offline';
                    siteLink.innerText = 'Standby for new link';
                    siteLink.classList.add('disabled');
                    siteLink.removeAttribute('href');
                } else {
                    // Site is marked as UP
                    banner.style.display = 'none';
                    statusContainer.className = 'status-indicator online';
                    statusText.innerText = 'Operational';
                    siteLink.innerText = 'Go to Website';
                    siteLink.classList.remove('disabled');
                    siteLink.href = data.currentUrl;
                }
            })
            .catch(error => {
                console.error("Error loading config:", error);
                document.getElementById('status-text').innerText = "Tracker Error";
            });
    </script>
</body>
</html>
